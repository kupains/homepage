<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINS - 이벤트</title>
    <style>
        /* ============================ */
        /* [1] 기본 스타일 및 레이아웃 너비 설정 */
        /* ============================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        section { 
            max-width: 1000px !important; 
            width: 100%;
            margin: 0 auto 28px auto !important; 
        }
        
        h2 { font-size: 2.2rem; margin-bottom: 40px; text-align: center; }

        .event-description {
            text-align: left;
            font-size: 1.1rem;
            color: #333333;
            margin-top: -20px;
            line-height: 1.5;
            word-break: keep-all;
            padding: 0 5px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .event-description {
                font-size: 0.95rem;
                margin-top: -10px;
                margin-bottom: 20px;
            }
        }

        /* ============================ */
        /* [2] 이벤트 리스트 및 버튼 스타일 */
        /* ============================ */
        .event-list {
            display: flex;
            flex-direction: column;
            gap: 40px; 
        }

        .event-btn {
            position: relative;
            display: block;
            width: 100%;
            height: 200px; /* 이벤트 배너 느낌을 위해 높이를 약간 키움 */
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            background-size: cover;
            background-position: center;
            cursor: pointer; 
            /* [수정] 부드러운 크기 확대 및 그림자 효과 추가 */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .event-btn::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4); 
            z-index: 1;
            /* [수정] 배경색 변경을 위한 전환 효과 */
            transition: background-color 0.3s ease;
        }

        /* [수정] 마우스 오버 시 박스가 약간 커지고 어두워짐 */
        .event-btn:hover {
            transform: scale(1.02); /* 크기 2% 확대 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.25); 
        }
        
        .event-btn:hover::before,
        .event-btn:active::before {
            background-color: rgba(0, 0, 0, 0.65); /* 색상이 더 어두워짐 */
        }

        /* 이벤트 제목 스타일 */
        .event-btn .event-name {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            width: 100%;
            text-align: center;
            letter-spacing: 2px;
            /* [수정] 마우스 오버 시에도 글씨가 사라지지 않도록 투명도 전환 제거 */
        }

        /* ============================ */
        /* [3] 반응형 스타일 (모바일) */
        /* ============================ */
        @media (max-width: 600px) { 
            h2 { font-size: 1.8rem; margin-bottom: 25px; }
            .event-btn { height: 180px; }
            .event-btn .event-name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header></header>
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" id="overlay"></div>

    <section>
        <h2>이벤트 안내</h2>
        <p class="event-description">
            PAINS에서 진행하는 다양한 이벤트에 참여해보세요!
        </p>
        
        <div class="event-list">
            
            <div class="event-btn" onclick="location.href='PBTItest'" style="background-image: url('images/PBTI.jpg');">
                <span class="event-name">나의 응원 유형은? - PBTI</span>
            </div>

            </div>
    </section>

    <footer></footer>

    <script>
        document.write('<script src="menu.js?v=' + new Date().getTime() + '"><\/script>');
    </script>
    
    <script>
        // 사이드바 호출 함수 (기존 society에서 event로 임의 변경)
        if (typeof loadSidebar === 'function') {
            loadSidebar('event');
        }
    </script>
    <script src="widget/chatbot.js"></script>
</body>
</html>

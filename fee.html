<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Providing Academic INsights for Sports.</title>
    <style>
        /* ============================ */
        /* [1] 폰트 및 공통 스타일        */
        /* ============================ */
        @font-face { font-family: 'KBO_Dia'; src: url('KBO_medium.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'SCDream'; src: url('SCDream5.otf'); font-weight: normal; font-style: normal; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* body를 Flex 컨테이너로 만들어서 푸터를 아래로 밀어냄 */
        body {
            font-family: 'SCDream', sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3 { font-family: 'KBO_Dia', sans-serif; }

        /* ============================ */
        /* [2] 메인 컨텐츠 세부 스타일    */
        /* ============================ */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem;
            flex: 1;
            width: 100%;
        }

        .section-card {
            background: white; border-radius: 12px; padding: 2rem;
            margin-bottom: 2rem;
            /* 테두리와 그림자는 menu.js에서 동적 주입 */
        }
        .section-card h3 { font-size: 1.5rem; margin-bottom: 1rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        .input-group input {
            width: 100%; padding: 12px; font-size: 1rem; font-family: 'SCDream', sans-serif; outline: none;
            /* 테두리, 둥근 모서리 등은 menu.js 덮어씌움 */
        }

        .btn-check {
            width: 100%; padding: 12px; background-color: #ab3333; color: white; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px;
        }
        .btn-check:hover { background-color: #8f2a2a; }

        /* ============================ */
        /* [3] 회비 내역 테이블 스타일    */
        /* ============================ */
        #fee-area { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .fee-table-wrapper { overflow-x: auto; margin-top: 20px; }
        .fee-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .fee-table th { background-color: #ab3333; color: white; padding: 12px; text-align: center; font-weight: bold; white-space: nowrap; }
        .fee-table td { padding: 12px; border-bottom: 1px solid #eee; color: #333; }
        .fee-table tr:last-child td { border-bottom: none; }
        .fee-table tr:hover { background-color: #f9f9f9; }

        .td-date { text-align: center; color: #666; font-size: 0.9rem; width: 15%; }
        .td-desc { text-align: left; font-weight: bold; width: 45%; }
        .td-amount { text-align: right; color: #e74c3c; font-weight: bold; width: 20%; }
        .td-balance { text-align: right; color: #27ae60; font-weight: bold; width: 20%; }

        .msg-welcome { font-size: 1.1rem; margin-bottom: 20px; color: #333; }
        .msg-welcome strong { color: #ab3333; }

        @media (max-width: 600px) {
            .fee-table th, .fee-table td { font-size: 0.85rem; padding: 10px 8px; }
        }
    </style>
    <script defer src="js/content-loader.js?v=20260528"></script>
</head>
<body>

    <header></header>
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" id="overlay"></div>

    <div class="container">

        <div class="section-card" id="auth-section">
            <h3>회비 내역 확인</h3>
            <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">
                회비 내역은 PAINS 부원만 열람 가능합니다.<br>
                학번과 이름을 입력해주세요.
            </p>

            <div class="input-group">
                <label>학번</label>
                <input type="text" id="check-id" placeholder="예: 2024123456">
            </div>
            <div class="input-group">
                <label>이름</label>
                <input type="text" id="check-name" placeholder="예: 홍길동">
            </div>

            <button class="btn-check" onclick="checkMemberAndFees()" id="btn-auth">조회하기</button>
        </div>

        <div class="section-card" id="fee-area">
            <h3>회비 입출금 내역</h3>

            <div class="fee-table-wrapper">
                <table class="fee-table">
                    <thead>
                        <tr>
                            <th>일자</th>
                            <th>내용</th>
                            <th>금액</th>
                            <th>잔액</th>
                        </tr>
                    </thead>
                    <tbody id="fee-tbody">
                        <tr><td colspan="4" style="text-align:center;">내역을 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <footer></footer>

    <script>
        document.write('<script src="menu.js?v=' + new Date().getTime() + '"><\/script>');
    </script>

    <script>
        loadSidebar('fee');

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxL7shd9op70ZSSuEYe3Iod6wSoRfQ_UKLs7DU1TdOAWoFr1Xr-d8ZDzBBQ_Iq1kEivPg/exec";

async function checkMemberAndFees() {
            const idInput = document.getElementById('check-id');
            const nameInput = document.getElementById('check-name');
            const id = idInput.value.trim();
            const name = nameInput.value.trim();

            if (!id || !name) { alert("학번과 이름을 모두 입력해주세요."); return; }

            const btn = document.getElementById('btn-auth');
            const originalText = btn.innerText;

            btn.disabled = true;
            btn.innerText = "확인 중...";

            try {
                // 👇 [수정 1] URL 끝에 보안 토큰(&token=PAINS_2026_CUSTOM_KEY) 추가
                const response = await fetch(`${SCRIPT_URL}?id=${id}&name=${name}&type=fee&token=PAINS_2026_CUSTOM_KEY`);
                const data = await response.json();

                // 👇 [수정 2] data.isMember === true 조건 추가
                if (data.result === "success" && data.isMember === true) {
                    // document.getElementById('user-name-display').innerHTML = `<strong>${name}</strong>`;
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('fee-area').style.display = 'block';

                    renderFeeTable(data.feeData);
                } else {
                    alert("일치하는 부원 정보가 없습니다.\n(등록된 부원만 열람 가능합니다)");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("조회 중 오류가 발생했습니다.");
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function renderFeeTable(feeData) {
            const tbody = document.getElementById('fee-tbody');

            if (!feeData || feeData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">회비 내역이 없습니다.</td></tr>';
                return;
            }

            if (typeof feeData === "string") {
                 tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:red;">${feeData}</td></tr>`;
                 return;
            }

            let html = "";
            feeData.forEach(row => {
                html += `
                    <tr>
                        <td class="td-date">${row.date}</td>
                        <td class="td-desc">${row.desc}</td>
                        <td class="td-amount">${row.amount}</td>
                        <td class="td-balance">${row.balance}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

    </script>
    <script src="widget/chatbot.js"></script>
</body>
</html>
